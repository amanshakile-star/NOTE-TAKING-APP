<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h1>Memory Intelligence Icon Generator</h1>
  <p>Right-click each canvas and "Save image as..."</p>
  
  <h2>icon-192.png</h2>
  <canvas id="icon192" width="192" height="192"></canvas>
  
  <h2>icon-512.png</h2>
  <canvas id="icon512" width="512" height="512"></canvas>
  
  <h2>apple-touch-icon.png (180x180)</h2>
  <canvas id="apple" width="180" height="180"></canvas>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, size, size);
      
      // Brain icon (simplified)
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/3, 0, Math.PI * 2);
      ctx.fill();
      
      // Inner details
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = size/30;
      ctx.beginPath();
      ctx.arc(size/2 - size/8, size/2 - size/12, size/8, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(size/2 + size/8, size/2 - size/12, size/8, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(size/2, size/2 + size/6, size/6, 0, Math.PI);
      ctx.stroke();
      
      // Text
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size/8}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('MI', size/2, size - size/6);
    }
    
    drawIcon('icon192', 192);
    drawIcon('icon512', 512);
    drawIcon('apple', 180);
  </script>
</body>
</html>
